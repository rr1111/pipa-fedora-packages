Syntax 3

SectionVerb {
 Value {
  TQ "HDMI"
 }
}

SectionDevice."DisplayPort" {
 Comment "DisplayPort playback"

 EnableSequence [
  cset "name='TERT_TDM_RX_0 Audio Mixer MultiMedia1' 0"
  cset "name='HDMI Mixer MultiMedia1' 0"
  cset "name='DISPLAY_PORT_RX Audio Mixer MultiMedia1' 1"
 ]

 DisableSequence [
  cset "name='DISPLAY_PORT_RX Audio Mixer MultiMedia1' 0"
  cset "name='HDMI Mixer MultiMedia1' 0"
 ]

 Value {
  PlaybackPriority 300
  PlaybackPCM "hw:${CardId},0"
  JackControl "DP0 Jack"
 }
}
